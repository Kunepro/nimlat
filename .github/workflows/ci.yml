name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

# Validation never needs to write to the repository or access release secrets.
permissions:
  contents: read

# A newer commit makes an older run for the same PR or branch irrelevant.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  full-validation:
    name: Full validation
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      CI: true

    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Electron E2E and DB smoke tests require a display even though no UI is shown.
      - name: Run complete validation bundle
        run: xvfb-run --auto-servernum npm run validate

      - name: Build production bundle
        run: npm run build

      - name: Audit production dependencies
        run: npm run audit:prod
