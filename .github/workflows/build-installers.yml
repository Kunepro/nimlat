name: Build draft release
run-name: Build draft release from ${{ github.ref_name }}

on:
  workflow_dispatch:

permissions:
  contents: read

# A version owns one mutable draft; concurrent runs would otherwise replace the same release assets.
concurrency:
  group: build-draft-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Validate release source
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    permissions:
      contents: write

    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # Drafts are versioned from package.json and may only represent the protected release branch.
      - name: Resolve release identity
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/master" ]]; then
            echo "Draft releases must be built from master, received ${GITHUB_REF}." >&2
            exit 1
          fi

          version="$(node -p "require('./package.json').version")"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "package.json contains an unsupported release version: ${version}" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"

      # A rerun refreshes the same mutable draft but never modifies an already published release.
      - name: Create or refresh draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            if [[ "$(gh release view "${RELEASE_TAG}" --json isDraft --jq '.isDraft')" != "true" ]]; then
              echo "${RELEASE_TAG} is already published; bump package.json before building another draft." >&2
              exit 1
            fi
            gh release edit "${RELEASE_TAG}" \
              --draft \
              --target "${GITHUB_SHA}" \
              --title "Nimlat ${RELEASE_VERSION}"
          else
            gh release create "${RELEASE_TAG}" \
              --draft \
              --target "${GITHUB_SHA}" \
              --title "Nimlat ${RELEASE_VERSION}" \
              --generate-notes
          fi

  package:
    name: ${{ matrix.label }}
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64 (NSIS)
            runner: windows-2025
            script: win
            node-architecture: x64
            args: --x64
          - label: Linux x64 (AppImage)
            runner: ubuntu-24.04
            script: linux
            node-architecture: x64
            args: --x64
          # macOS updates are manual because ad-hoc signatures cannot satisfy Squirrel.Mac across builds.
          - label: macOS x64 and ARM64 (DMG)
            runner: macos-15-intel
            script: mac
            node-architecture: x64
            args: ""

    env:
      CI: true

    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          architecture: ${{ matrix.node-architecture }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # macOS is verified before upload so a broken code seal can never replace the draft assets.
      - name: Package and upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_SCRIPT: ${{ matrix.script }}
        shell: bash
        run: |
          if [[ "${PACKAGE_SCRIPT}" == "mac" ]]; then
            npm run package:mac -- ${{ matrix.args }} --publish never
          else
            npm run "package:${PACKAGE_SCRIPT}" -- ${{ matrix.args }} --publish always
          fi

      # Free macOS distribution still needs a structurally valid ad-hoc signature.
      # Gatekeeper does not trust it as a Developer ID, but it must never report a damaged code seal.
      - name: Verify ad-hoc macOS signatures
        if: matrix.script == 'mac'
        shell: bash
        run: |
          apps=()
          while IFS= read -r -d '' app; do
            apps+=("${app}")
          done < <(find release -type d -name 'Nimlat.app' -prune -print0)

          if (( ${#apps[@]} != 2 )); then
            echo "Expected two macOS app bundles, found ${#apps[@]}." >&2
            exit 1
          fi

          architectures=()
          for app in "${apps[@]}"; do
            codesign --verify --deep --strict --verbose=4 "${app}"

            signature_info="$(codesign -dv --verbose=4 "${app}" 2>&1)"
            if ! grep -Fq 'Signature=adhoc' <<< "${signature_info}"; then
              echo "Expected an ad-hoc signature for ${app}." >&2
              echo "${signature_info}" >&2
              exit 1
            fi

            architectures+=("$(lipo -archs "${app}/Contents/MacOS/Nimlat")")
          done

          actual_architectures="$(printf '%s\n' "${architectures[@]}" | sort)"
          expected_architectures="$(printf '%s\n' arm64 x86_64 | sort)"
          if [[ "${actual_architectures}" != "${expected_architectures}" ]]; then
            echo "Unexpected macOS architectures:" >&2
            echo "${actual_architectures}" >&2
            exit 1
          fi

      - name: Upload verified macOS release assets
        if: matrix.script == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        shell: bash
        run: |
          # Only the human-facing DMGs belong in the release. ZIPs, blockmaps, and
          # latest-mac.yml exclusively support the unavailable Squirrel.Mac flow.
          assets=(
            "release/Nimlat-${RELEASE_VERSION}-macOS-arm64.dmg"
            "release/Nimlat-${RELEASE_VERSION}-macOS-x64.dmg"
          )
          for asset in "${assets[@]}"; do
            if [[ ! -f "${asset}" ]]; then
              echo "Missing verified macOS release asset: ${asset}" >&2
              exit 1
            fi
          done
          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber

  verify-release:
    name: Verify draft release
    needs:
      - prepare-release
      - package
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    permissions:
      # GitHub hides draft releases from read-only tokens, so write scope is
      # required even though every command in this job is read-only.
      contents: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}

    steps:
      # Publishing remains a deliberate UI action after every expected installer and updater file exists.
      - name: Verify draft and required assets
        shell: bash
        run: |
          if [[ "$(gh release view "${RELEASE_TAG}" --json isDraft --jq '.isDraft')" != "true" ]]; then
            echo "${RELEASE_TAG} is not a draft release." >&2
            exit 1
          fi

          asset_names="$(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name')"
          expected_assets=(
            "Nimlat-${RELEASE_VERSION}-Windows-x64.exe"
            "Nimlat-${RELEASE_VERSION}-Windows-x64.exe.blockmap"
            "Nimlat-${RELEASE_VERSION}-Linux-x86_64.AppImage"
            "Nimlat-${RELEASE_VERSION}-macOS-x64.dmg"
            "Nimlat-${RELEASE_VERSION}-macOS-arm64.dmg"
            "latest.yml"
            "latest-linux.yml"
          )

          missing=0
          for asset in "${expected_assets[@]}"; do
            if ! grep -Fxq "${asset}" <<< "${asset_names}"; then
              echo "Missing draft release asset: ${asset}" >&2
              missing=1
            fi
          done
          if (( missing != 0 )); then
            exit 1
          fi

          # Keep GitHub's asset list literal: the OS belongs in the filename and no label should hide it.
          release_id="$(gh release view "${RELEASE_TAG}" --json databaseId --jq '.databaseId')"
          release_assets="$(gh api "repos/${GH_REPO}/releases/${release_id}/assets?per_page=100")"
          clear_asset_label() {
            local asset_name="$1"
            local asset_id

            asset_id="$(jq -r --arg name "${asset_name}" '.[] | select(.name == $name) | .id' <<< "${release_assets}")"
            if [[ -z "${asset_id}" ]]; then
              echo "Cannot clear label for missing release asset: ${asset_name}" >&2
              exit 1
            fi
            gh api --method PATCH "repos/${GH_REPO}/releases/assets/${asset_id}" \
              -f 'label=' >/dev/null
          }

          for asset in "${expected_assets[@]}"; do
            clear_asset_label "${asset}"
          done

          # Remove the previously managed guide while preserving GitHub's generated release notes.
          existing_notes="$(mktemp)"
          clean_notes="$(mktemp)"
          trap 'rm -f "${existing_notes}" "${clean_notes}"' EXIT
          gh release view "${RELEASE_TAG}" --json body --jq '.body' > "${existing_notes}"
          if grep -Fqx '<!-- nimlat-download-guide:start -->' "${existing_notes}"; then
            awk '
              $0 == "<!-- nimlat-download-guide:start -->" { skip = 1; next }
              $0 == "<!-- nimlat-download-guide:end -->" { skip = 0; next }
              !skip { print }
            ' "${existing_notes}" > "${clean_notes}"
            gh release edit "${RELEASE_TAG}" --notes-file "${clean_notes}"
          fi

          # Remove only known legacy names after all OS-qualified replacements are verified.
          legacy_assets=(
            "Nimlat-${RELEASE_VERSION}-Windows-x64-Setup.exe"
            "Nimlat-${RELEASE_VERSION}-Windows-x64-Setup.exe.blockmap"
            "Nimlat-${RELEASE_VERSION}-x64.exe"
            "Nimlat-${RELEASE_VERSION}-x64.exe.blockmap"
            "Nimlat-${RELEASE_VERSION}-x86_64.AppImage"
            "Nimlat-${RELEASE_VERSION}-arm64.dmg"
            "Nimlat-${RELEASE_VERSION}-arm64.dmg.blockmap"
            "Nimlat-${RELEASE_VERSION}-arm64.zip"
            "Nimlat-${RELEASE_VERSION}-arm64.zip.blockmap"
            "Nimlat-${RELEASE_VERSION}-x64.dmg"
            "Nimlat-${RELEASE_VERSION}-x64.dmg.blockmap"
            "Nimlat-${RELEASE_VERSION}-x64.zip"
            "Nimlat-${RELEASE_VERSION}-x64.zip.blockmap"
            # These files supported Squirrel.Mac and must not clutter a manual-download release.
            "Nimlat-${RELEASE_VERSION}-macOS-arm64.dmg.blockmap"
            "Nimlat-${RELEASE_VERSION}-macOS-arm64.zip"
            "Nimlat-${RELEASE_VERSION}-macOS-arm64.zip.blockmap"
            "Nimlat-${RELEASE_VERSION}-macOS-x64.dmg.blockmap"
            "Nimlat-${RELEASE_VERSION}-macOS-x64.zip"
            "Nimlat-${RELEASE_VERSION}-macOS-x64.zip.blockmap"
            "latest-mac.yml"
          )
          for asset in "${legacy_assets[@]}"; do
            if grep -Fxq "${asset}" <<< "${asset_names}"; then
              gh release delete-asset "${RELEASE_TAG}" "${asset}" --yes
            fi
          done

          # Fail closed if a packaging change starts publishing anything outside the reviewed public asset set.
          final_asset_names="$(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name')"
          unexpected=0
          while IFS= read -r asset; do
            if [[ -n "${asset}" ]] && ! printf '%s\n' "${expected_assets[@]}" | grep -Fxq "${asset}"; then
              echo "Unexpected draft release asset: ${asset}" >&2
              unexpected=1
            fi
          done <<< "${final_asset_names}"
          if (( unexpected != 0 )); then
            exit 1
          fi

          release_url="$(gh release view "${RELEASE_TAG}" --json url --jq '.url')"
          {
            echo "## Draft release ready"
            echo
            echo "[Open ${RELEASE_TAG}](${release_url}) to download, inspect, and publish the release."
          } >> "${GITHUB_STEP_SUMMARY}"
